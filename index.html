<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazone</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="amz-logo">
          <div class="logo"></div>
        </div>
        <div class="nav-address">
          <p class="address-first">Devliver to</p>
          <div id="add-icon">
            <i class="fa-solid fa-location-dot"></i>
            <p class="address-second">Select your address</p>
          </div>
        </div>
        <div class="nav-search">
          <select class="search-select">
            <option>ALL</option>
            <option value="option1">ALL</option>
            <option value="option2" selecte>GIft card</option>
            <option value="option3">baby</option>
            <option value="option4">boy shop</option>
          </select>
          <input
            type="search"
            name="search"
            placeholder="Search amazon.in"
            class="search-input"
          />
          <div class="icon-search">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
        <div class="nav-signin">
          <p><span>Hello,sign in</span></p>
          <p class="second-nav">Account & list</p>
        </div>
        <div class="return">
          <p><span>Returns</span></p>
          <p class="order">&orders</p>
        </div>
        <div class="cart-icon">
          <i class="fa-solid fa-cart-shopping"></i> Cart
        </div>
      </div>
      <div class="second-navbar">
        <div class="panel-icon">
          <i class="fa-solid fa-bars" style="color: #d7d4cb"></i> All
        </div>
        <div class="amzon-tv">
          <p>Best Sellers</p>
          <p>Today's Deals</p>
          <p>Mobiles</p>

          <p>Customer Service</p>

          <p>Electronics</p>
        </div>
        <div class="shoping-made">
          <p>shopping made easy||Download App</p>
        </div>
      </div>
    </header>
  </body>
</html>
